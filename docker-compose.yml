version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smart-leads-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: smart-leads-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/smartleads
      - JWT_SECRET=your_super_secret_jwt_key_here
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: smart-leads-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo-data: